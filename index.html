<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 서비스 허브 2606</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080e1a;
      --surface:   #101827;
      --surface2:  #19243a;
      --surface3:  #212f48;
      --border:    #263347;
      --text:      #dde6f5;
      --muted:     #6b82a8;
      --header-h:  64px;
      --sidebar-w: 220px;
    }

    /* ── LIVE MODE (light) ─────────────────────────────── */
    body.live-mode {
      --bg:       #f0f4f8;
      --surface:  #ffffff;
      --surface2: #f1f5f9;
      --surface3: #e2eaf4;
      --border:   #cbd5e1;
      --text:     #0f172a;
      --muted:    #64748b;
    }
    body.live-mode header {
      background: rgba(255,255,255,0.97);
    }
    body.live-mode .logo-text {
      background: linear-gradient(120deg, #6366f1, #db2777 55%, #ea580c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    body.live-mode .top-btn { color: #475569; }
    body.live-mode .top-btn:hover { background: var(--surface2); color: var(--text); }
    body.live-mode .card { box-shadow: 0 1px 4px rgba(0,0,0,.07); }
    body.live-mode .card:hover { box-shadow: 0 8px 28px rgba(0,0,0,.13), 0 0 0 1px var(--ca, transparent); }
    body.live-mode .total-pill { background: #f1f5f9; border-color: #cbd5e1; }

    /* 전환 애니메이션 */
    body, header, .sidebar, .card, .top-btn, .side-btn, main, footer {
      transition: background .25s, color .2s, border-color .2s, box-shadow .2s;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ──────────────────────────────────────────── */
    header {
      position: fixed;
      inset: 0 0 auto 0;
      height: var(--header-h);
      background: rgba(16, 24, 39, 0.97);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 10px;
      z-index: 300;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-right: 6px;
      flex-shrink: 0;
    }
    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .logo-text {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(120deg, #a5b4fc, #f9a8d4 55%, #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      white-space: nowrap;
    }

    .top-nav {
      display: flex;
      gap: 3px;
      overflow-x: auto;
      scrollbar-width: none;
      flex: 1;
    }
    .top-nav::-webkit-scrollbar { display: none; }

    .search-box {
      position: relative;
      width: clamp(180px, 22vw, 320px);
      flex-shrink: 0;
    }
    .search-input {
      width: 100%;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface2);
      color: var(--text);
      padding: 0 34px 0 34px;
      font-size: .8rem;
      outline: none;
      transition: border-color .15s, background .15s, box-shadow .15s;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus {
      border-color: #14b8a6;
      background: var(--surface);
      box-shadow: 0 0 0 3px #14b8a620;
    }
    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: .82rem;
      pointer-events: none;
    }
    .search-clear {
      position: absolute;
      right: 7px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: none;
      line-height: 1;
    }
    .search-clear.visible { display: block; }
    .search-clear:hover { background: var(--surface3); color: var(--text); }

    .top-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 13px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all .17s;
    }
    .top-btn:hover { background: var(--surface2); color: var(--text); }
    .top-btn.active { color: #fff; font-weight: 700; }

    .top-btn[data-cat="chatbot"].active   { background: #3730a3; box-shadow: 0 0 12px #4f46e540; }
    .top-btn[data-cat="image"].active     { background: #9d174d; box-shadow: 0 0 12px #ec489940; }
    .top-btn[data-cat="audio"].active     { background: #92400e; box-shadow: 0 0 12px #f59e0b40; }
    .top-btn[data-cat="dev"].active       { background: #065f46; box-shadow: 0 0 12px #10b98140; }
    .top-btn[data-cat="writing"].active   { background: #7c2d12; box-shadow: 0 0 12px #f9731640; }
    .top-btn[data-cat="platform"].active  { background: #1e3a8a; box-shadow: 0 0 12px #3b82f640; }
    .top-btn[data-cat="edu"].active       { background: #0e7490; box-shadow: 0 0 12px #0891b240; }
    .top-btn[data-cat="insight"].active   { background: #0f766e; box-shadow: 0 0 12px #14b8a640; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .total-pill {
      font-size: 0.72rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
      color: var(--muted);
      white-space: nowrap;
    }
    .total-pill span { color: var(--text); font-weight: 600; }

    /* ── MODE TOGGLE BUTTON ───────────────────────────── */
    .mode-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s;
      flex-shrink: 0;
    }
    .mode-toggle:hover { border-color: var(--text); color: var(--text); }
    body.live-mode .mode-toggle {
      background: #f1f5f9;
      border-color: #cbd5e1;
      color: #475569;
    }
    body.live-mode .mode-toggle:hover { border-color: #0f172a; color: #0f172a; }

    /* ── SIDEBAR ──────────────────────────────────────────── */
    .sidebar {
      position: fixed;
      top: var(--header-h);
      left: 0;
      width: var(--sidebar-w);
      height: calc(100vh - var(--header-h));
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 200;
    }

    .sidebar-inner {
      flex: 1;
      overflow-y: auto;
      padding: 16px 10px 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .side-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 8px 10px;
    }

    .side-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 9px 10px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.82rem;
      text-align: left;
      cursor: pointer;
      transition: all .15s;
      margin-bottom: 2px;
    }
    .side-btn:hover { background: var(--surface2); color: var(--text); }
    .side-btn.active { background: var(--surface3); color: var(--text); font-weight: 600; }

    .side-cnt {
      font-size: .68rem;
      background: var(--border);
      color: var(--muted);
      padding: 1px 7px;
      border-radius: 20px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .side-btn.active .side-cnt { background: rgba(255,255,255,.12); color: var(--text); }

    .sidebar-footer {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      font-size: .72rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── MAIN ─────────────────────────────────────────────── */
    main {
      margin-top: var(--header-h);
      margin-left: var(--sidebar-w);
      padding: 28px 26px;
      min-height: calc(100vh - var(--header-h));
    }

    .section-head {
      margin-bottom: 24px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .section-head-left h2 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 5px;
    }
    .section-head-left p { font-size: .83rem; color: var(--muted); }
    .section-head-left strong { color: var(--text); }

    .sub-filter {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-chip {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: .75rem;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .filter-chip:hover { border-color: var(--text); color: var(--text); }
    .filter-chip.active { color: #fff; border-color: transparent; }

    /* ── CARDS ────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-decoration: none;
      color: inherit;
      transition: transform .18s, border-color .18s, box-shadow .18s, background .18s;
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: radial-gradient(ellipse at top left, var(--ca, transparent) 0%, transparent 65%);
      opacity: 0;
      transition: opacity .25s;
      pointer-events: none;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: var(--ca, var(--border));
      box-shadow: 0 12px 32px rgba(0,0,0,.45), 0 0 0 1px var(--ca, transparent);
      background: var(--surface2);
    }
    .card:hover::after { opacity: .12; }

    /* NEW badge */
    .card.is-new::before {
      content: 'NEW';
      position: absolute;
      top: 12px; right: 12px;
      font-size: .6rem;
      font-weight: 800;
      letter-spacing: .05em;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
    }
    /* ── FAVORITE TOGGLE BUTTON ──────────────────────────── */
    .fav-btn {
      position: absolute;
      top: 9px; left: 9px;
      width: 24px; height: 24px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: .95rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
      z-index: 5;
      opacity: 0;
      padding: 0;
      line-height: 1;
    }
    .card:hover .fav-btn { opacity: 1; }
    .fav-btn.is-fav { opacity: 1; color: #f59e0b; }
    .fav-btn:hover { background: rgba(255,255,255,.08); transform: scale(1.1); color: #f59e0b; }
    body.live-mode .fav-btn:hover { background: rgba(0,0,0,.06); }
    .grid-section-title {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: .82rem;
      font-weight: 800;
      margin: 4px 0 -4px;
    }
    .grid-section-title span {
      color: var(--muted);
      font-size: .72rem;
      font-weight: 600;
    }

    .card-top { display: flex; align-items: center; gap: 12px; }

    .icon-box {
      width: 46px; height: 46px;
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.15rem;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
      letter-spacing: -0.02em;
      position: relative;
    }

    .card-meta { min-width: 0; flex: 1; }
    .card-name {
      font-size: .95rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-sub {
      font-size: .7rem;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-desc {
      font-size: .78rem;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
    }

    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 4px;
      border-top: 1px solid var(--border);
    }
    .card-url {
      font-size: .68rem;
      color: var(--muted);
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 70%;
    }
    .card-go {
      font-size: .75rem;
      color: var(--muted);
      transition: color .15s, gap .15s;
      display: flex; align-items: center; gap: 3px;
    }
    .card:hover .card-go { color: #fff; }

    /* ── EMPTY ────────────────────────────────────────────── */
    .empty {
      grid-column: 1/-1;
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
      font-size: .9rem;
    }

    /* ── FOOTER ───────────────────────────────────────────── */
    footer {
      margin-left: var(--sidebar-w);
      padding: 18px 26px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: .75rem;
      color: var(--muted);
    }

    /* ── SCROLLBAR ────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--surface3); }

    /* ── RESPONSIVE ───────────────────────────────────────── */
    @media (max-width: 768px) {
      :root { --sidebar-w: 0px; }
      .sidebar { display: none; }
      main, footer { margin-left: 0; padding: 16px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
      .section-head { flex-direction: column; }
      header { flex-wrap: wrap; height: auto; min-height: var(--header-h); padding-block: 10px; }
      .search-box { order: 3; width: 100%; }
    }
    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
      .logo-text { display: none; }
    }
  </style>
</head>

  { name:'오픈애즈',     url:'https://www.openads.co.kr/home',       i:'O', c:'#f97316', cat:'insight', sub:'marketing', desc:'광고·마케팅 칼럼, 캠페인 사례, 미디어 전략을 참고할 수 있는 마케팅 플랫폼', addedAt:'2026-06-29' },
  { name:'트렌드라이트', url:'https://trendlite.stibee.com/',        i:'T', c:'#f59e0b', cat:'insight', sub:'marketing', desc:'커머스·브랜드·소비 시장 흐름을 큐레이션하는 트렌드 뉴스레터 아카이브', addedAt:'2026-06-29' },

  /* ── 트렌드/시장 인사이트 > 시장 데이터 ─────────────────────────────── */
  { name:'WiseApp',      url:'https://www.wiseapp.co.kr/',           i:'W', c:'#2563eb', cat:'insight', sub:'data', desc:'앱 사용량, 결제 데이터, 소비자 행동을 기반으로 시장 규모와 경쟁 현황을 분석하는 데이터 서비스', addedAt:'2026-06-29', isFavorite:true },

  /* ── 트렌드/시장 인사이트 > IT/AI 뉴스 ─────────────────────────────── */
  { name:'AI TIMES',     url:'https://www.aitimes.com/',             i:'A', c:'#7c3aed', cat:'insight', sub:'technews', desc:'AI 산업 뉴스, 정책, 기술 동향, 기업 사례를 빠르게 확인하는 국내 AI 전문 미디어', addedAt:'2026-06-29' },
  { name:'Surfit',       url:'https://surfit.io/',                   i:'S', c:'#111827', cat:'insight', sub:'technews', desc:'개발·디자인·프로덕트 실무자가 참고하기 좋은 국내외 아티클과 인사이트를 큐레이션하는 서비스', addedAt:'2026-06-29' },

  /* ── 트렌드/시장 인사이트 > 디자인 레퍼런스 ─────────────────────────── */
  { name:'Vimeo Watch',  url:'https://vimeo.com/watch',              i:'V', c:'#1ab7ea', cat:'insight', sub:'reference', desc:'영상 디자인, 모션그래픽, 브랜드 필름 제작 레퍼런스를 탐색하기 좋은 비디오 플랫폼', addedAt:'2026-06-29' },
];

/* ═══════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════ */
let curCat = 'chatbot';
let curSub = 'all';
let searchQuery = '';

/* ── FAVORITES (LocalStorage) ──────────────────────────── */
const LS_FAV = 'favs_v1';
let favSet;
(function initFavs() {
  const saved = localStorage.getItem(LS_FAV);
  if (saved !== null) {
    favSet = new Set(JSON.parse(saved));
  } else {
    /* DB isFavorite 값을 초기 기본값으로 시드 */
    favSet = new Set(DB.filter(s => s.isFavorite).map(s => s.url));
    localStorage.setItem(LS_FAV, JSON.stringify([...favSet]));
  }
})();

/* ═══════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════ */
const getCat  = id => CATS.find(c => c.id === id);
const getSubN = (catId, subId) => getCat(catId).subs.find(s => s.id === subId)?.name ?? '';
const getHost = url => { try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return url; } };
const isEmoji = s => [...s].length > 1;
const cleanLabel = s => String(s ?? '').replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}]/gu, '').trim();
const norm = s => String(s ?? '').toLowerCase().replace(/\s+/g, ' ').trim();
const searchText = s => {
  const cat = getCat(s.cat);
  const sub = cat?.subs.find(x => x.id === s.sub);
  return norm([s.name, s.desc, s.url, getHost(s.url), cleanLabel(cat?.name), cleanLabel(sub?.name)].join(' '));
};
const daysSince = date => Math.floor((Date.now() - new Date(`${date}T00:00:00`).getTime()) / 86400000);
const isNewItem = s => Boolean(s.addedAt) && daysSince(s.addedAt) >= 0 && daysSince(s.addedAt) <= 30;

/* ═══════════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════════ */
function renderAll() { renderTopNav(); renderSidebar(); renderMain(); }

function renderTopNav() {
  document.getElementById('topNav').innerHTML = CATS.map(c =>
    `<button class="top-btn${curCat===c.id?' active':''}" data-cat="${c.id}"
       onclick="selCat('${c.id}')">${c.name}</button>`
  ).join('');

  const total = DB.length;
  document.getElementById('totalN').textContent = total;
  const clearBtn = document.getElementById('searchClear');
  if (clearBtn) clearBtn.classList.toggle('visible', Boolean(searchQuery));
}

function renderSidebar() {
  const cat = getCat(curCat);
  const allN = DB.filter(s => s.cat === curCat).length;
  const newN = DB.filter(s => s.cat === curCat && isNewItem(s)).length;

  let html = `<button class="side-btn${curSub==='all'?' active':''}" onclick="selSub('all')">
    <span>📋 전체 보기</span><span class="side-cnt">${allN}</span></button>`;

  cat.subs.forEach(sub => {
    const n = DB.filter(s => s.cat === curCat && s.sub === sub.id).length;
    html += `<button class="side-btn${curSub===sub.id?' active':''}" onclick="selSub('${sub.id}')">
      <span>${sub.name}</span><span class="side-cnt">${n}</span></button>`;
  });

  document.getElementById('sideItems').innerHTML = html;
  document.getElementById('sideFooter').innerHTML =
    `<strong style="color:var(--text)">${cat.name}</strong><br>총 ${allN}개 서비스${newN ? ` · 🆕 신규 ${newN}개` : ''}`;
}

function renderMain() {
  const q = norm(searchQuery);
  let cat = getCat(curCat);
  let list = DB.filter(s => s.cat === curCat);
  let heading = cat.name;
  let description = cat.desc;
  let chips = '';
  let subLabel = curSub === 'all' ? '전체'
    : (cat.subs.find(s => s.id === curSub)?.name ?? '');

  if (q) {
    list = DB.filter(s => searchText(s).includes(q));
    heading = `검색 결과: ${searchQuery}`;
    description = `이름, 설명, URL, 상위/하위 카테고리에서 ${list.length}개 사이트를 찾았습니다.`;
  } else {
    if (curSub !== 'all') list = list.filter(s => s.sub === curSub);

    chips = [
      { id:'all', label:'🔎 전체' },
      ...cat.subs.map(s => ({ id:s.id, label:s.name }))
    ].map(ch =>
      `<button class="filter-chip${curSub===ch.id?' active':''}"
         style="${curSub===ch.id?`background:${cat.accent};`:''}"
         onclick="selSub('${ch.id}')">${ch.label}</button>`
    ).join('');

    const newCount = list.filter(s => isNewItem(s)).length;
    const favoriteCount = list.filter(s => favSet.has(s.url)).length;
    description = `${description} &nbsp;•&nbsp; <strong>${subLabel} ${list.length}개</strong>${favoriteCount ? ` &nbsp;•&nbsp; ★ 자주 쓰는 사이트 <strong>${favoriteCount}개</strong>` : ''}${newCount ? ` &nbsp;•&nbsp; 🆕 신규 <strong>${newCount}개</strong>` : ''}`;
  }

  document.getElementById('secHead').innerHTML = `
    <div class="section-head-left">
      <h2>${heading}</h2>
      <p>${description}</p>
    </div>
    <div class="sub-filter">${chips}</div>
  `;

  if (!list.length) {
    document.getElementById('cardGrid').innerHTML =
      `<div class="empty">검색 결과가 없습니다.</div>`;
    return;
  }

  const cardHtml = s => {
    const itemCat = getCat(s.cat);
    const cardAccent = itemCat?.accent ?? cat.accent;
    const subName = q ? `${cleanLabel(itemCat?.name)} · ${getSubN(s.cat, s.sub)}` : getSubN(s.cat, s.sub);
    const isFav = favSet.has(s.url);
    return `
    <a href="${s.url}" target="_blank" rel="noopener noreferrer"
       class="card${isNewItem(s)?' is-new':''}${isFav?' is-favorite':''}" style="--ca:${cardAccent}">
      <button class="fav-btn${isFav?' is-fav':''}" data-url="${s.url}"
        onclick="toggleFav(event,this.dataset.url)"
        title="${isFav?'즐겨찾기 해제':'즐겨찾기 추가'}">${isFav?'★':'☆'}</button>
      <div class="card-top">
        <div class="icon-box" style="background:${s.c};${isEmoji(s.i)?'font-size:1.5rem':''}">
          ${s.i}
        </div>
        <div class="card-meta">
          <div class="card-name">${s.name}</div>
          <div class="card-sub">${subName}</div>
        </div>
      </div>
      <div class="card-desc">${s.desc}</div>
      <div class="card-foot">
        <span class="card-url">${getHost(s.url)}</span>
        <span class="card-go">바로가기<span>→</span></span>
      </div>
    </a>`;
  };

  if (q) {
    document.getElementById('cardGrid').innerHTML = list.map(cardHtml).join('');
  } else {
    const favorites = list.filter(s => favSet.has(s.url));
    const regular = list.filter(s => !favSet.has(s.url));
    document.getElementById('cardGrid').innerHTML = [
      favorites.length ? `<div class="grid-section-title">★ 자주 쓰는 사이트 <span>${favorites.length}개</span></div>` : '',
      favorites.map(cardHtml).join(''),
      favorites.length && regular.length ? `<div class="grid-section-title">전체 사이트 <span>${regular.length}개</span></div>` : '',
      regular.map(cardHtml).join('')
    ].join('');
  }

  document.getElementById('pageFooter').innerHTML = `
    <span>AI 서비스 허브 &nbsp;•&nbsp; ${q ? '검색' : cat.name} &nbsp;•&nbsp; ${list.length}개 표시 중</span>
    <span>총 ${DB.length}개 서비스&nbsp;•&nbsp; 🆕 최근 30일 신규 ${DB.filter(s=>isNewItem(s)).length}개</span>
  `;
}
/* ═══════════════════════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════════════════════ */
function toggleFav(e, url) {
  e.preventDefault();
  e.stopPropagation();
  if (favSet.has(url)) { favSet.delete(url); } else { favSet.add(url); }
  localStorage.setItem(LS_FAV, JSON.stringify([...favSet]));
  renderMain();
}

function selCat(id) {
  curCat = id;
  curSub = 'all';
  clearSearch(false);
  renderAll();
}
function selSub(id) {
  curSub = id;
  clearSearch(false);
  renderSidebar();
  renderMain();
}
function setSearch(value) {
  searchQuery = value;
  renderTopNav();
  renderMain();
}
function clearSearch(render = true) {
  searchQuery = '';
  const input = document.getElementById('searchInput');
  if (input) input.value = '';
  if (render) {
    renderTopNav();
    renderMain();
  }
}

/* ═══════════════════════════════════════════════════════════
   MODE TOGGLE
═══════════════════════════════════════════════════════════ */
function toggleMode() {
  const isLive = document.body.classList.toggle('live-mode');
  localStorage.setItem('mode', isLive ? 'live' : 'dark');
  updateModeBtn(isLive);
}

function updateModeBtn(isLive) {
  document.getElementById('modeIcon').textContent  = isLive ? '🌙' : '☀️';
  document.getElementById('modeLabel').textContent = isLive ? '다크' : '라이브';
}

/* ═══════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════ */
(function initMode() {
  const saved = localStorage.getItem('mode');
  if (saved === 'live') {
    document.body.classList.add('live-mode');
    updateModeBtn(true);
  }
})();

renderAll();
</script>
</body>
</html>
