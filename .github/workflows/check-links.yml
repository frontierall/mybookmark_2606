name: Check Links

on:
  schedule:
    - cron: '0 2 * * 1'   # 매주 월요일 새벽 2시 (UTC)
  workflow_dispatch:        # GitHub UI에서 수동 실행 가능

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run link checker
        run: node check-links.js

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add link-status.json
          git diff --staged --quiet || git commit -m "chore: update link status [skip ci]"
          git push
